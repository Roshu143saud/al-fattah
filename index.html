<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al-Fattah Car Garage | Service Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e293b);
    min-height:100vh;
    padding:20px;
}

.container{
    width:100%;
    max-width:900px;
    margin:auto;
}

.form-card{
    background:#fff;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
}

.header{
    background:linear-gradient(135deg,#f59e0b,#d97706);
    color:white;
    text-align:center;
    padding:30px;
}

.header h1{
    font-size:32px;
    margin-bottom:10px;
}

.header p{
    opacity:.95;
}

.form-body{
    padding:40px;
}

.section-title{
    font-size:18px;
    font-weight:600;
    color:#111827;
    margin-bottom:20px;
    padding-bottom:10px;
    border-bottom:2px solid #f59e0b;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:30px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.full{
    grid-column:span 2;
}

label{
    margin-bottom:8px;
    font-size:14px;
    font-weight:600;
    color:#374151;
}

input,
select,
textarea{
    width:100%;
    padding:15px;
    border:2px solid #e5e7eb;
    border-radius:10px;
    font-size:15px;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#f59e0b;
    box-shadow:0 0 15px rgba(245,158,11,.2);
}

textarea{
    resize:vertical;
    min-height:120px;
}

.submit-btn{
    width:100%;
    padding:18px;
    background:#f59e0b;
    color:white;
    border:none;
    border-radius:10px;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    background:#d97706;
    transform:translateY(-2px);
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#6b7280;
    font-size:13px;
}

/* MOBILE */

@media screen and (max-width:768px){

    body{
        padding:10px;
    }

    .form-body{
        padding:20px;
    }

    .header h1{
        font-size:24px;
    }

    .form-grid{
        grid-template-columns:1fr;
        gap:15px;
    }

    .full{
        grid-column:auto;
    }

    input,
    select,
    textarea{
        padding:16px;
        font-size:16px;
    }

    .submit-btn{
        padding:16px;
        font-size:16px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="form-card">

<div class="header">
    <h1>AL-FATTAH CAR GARAGE</h1>
    <p>Professional Vehicle Service & Maintenance Registration</p>
</div>

<div class="form-body">

<form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DdL00000wSdoD" method="POST">

<input type="hidden" name="oid" value="00DdL00000wSdoD">

<!-- CUSTOMER INFORMATION -->

<div class="section-title">
Customer Information
</div>

<div class="form-grid">

<div class="form-group">
<label>First Name</label>
<input type="text" name="first_name" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" name="last_name" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" name="phone">
</div>

<div class="form-group">
<label>Business/Organization</label>
<input type="text" name="company">
</div>

<div class="form-group">
<label>City</label>
<input type="text" name="city">
</div>

<div class="form-group">
<label>Country</label>
<select name="country_code">
<option value="">Select Country</option>
<option value="IN">India</option>
<option value="AE">United Arab Emirates</option>
<option value="SA">Saudi Arabia</option>
<option value="KW">Kuwait</option>
</select>
</div>

<div class="form-group">
<label>State</label>
<select name="state_code">
<option value="">Select State</option>
<option value="AP">Andhra Pradesh</option>
<option value="TG">Telangana</option>
<option value="KA">Karnataka</option>
<option value="TN">Tamil Nadu</option>
</select>
</div>

</div>

<!-- VEHICLE INFORMATION -->

<div class="section-title">
Vehicle Information
</div>

<div class="form-grid">

<div class="form-group">
<label>Vehicle Name</label>
<input
id="00NdL00002TNNjn"
name="00NdL00002TNNjn"
type="text">
</div>

<div class="form-group">
<label>Vehicle Brand</label>
<input type="text">
</div>

<div class="form-group">
<label>Vehicle Model</label>
<input type="text">
</div>

<div class="form-group">
<label>Service Required</label>
<select>
<option>General Service</option>
<option>Oil Change</option>
<option>Engine Repair</option>
<option>Brake Service</option>
<option>AC Repair</option>
<option>Electrical Work</option>
</select>
</div>

<div class="form-group full">
<label>Additional Notes</label>
<textarea placeholder="Describe your vehicle issue or service requirement"></textarea>
</div>

</div>

<button class="submit-btn" type="submit">
REGISTER SERVICE REQUEST
</button>

</form>

<div class="footer">
© 2026 Al-Fattah Car Garage | Professional Vehicle Care Services
</div>

</div>
</div>
</div>

</body>
</html>
