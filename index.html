<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Al-Fattah Car Garage | Service Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b1120;
    background-image:
        radial-gradient(circle at top right,#f59e0b30,transparent 25%),
        radial-gradient(circle at bottom left,#f9731630,transparent 25%);
    min-height:100vh;
    padding:15px;
}

.container{
    width:100%;
    max-width:900px;
    margin:auto;
}

.form-card{
    background:#ffffff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,.35);
}

/* HEADER */

.header{
    background:linear-gradient(135deg,#111827,#1f2937);
    padding:40px 30px;
    text-align:center;
}

.header h1{
    color:#f59e0b;
    font-size:34px;
    font-weight:700;
}

.header p{
    color:#d1d5db;
    margin-top:8px;
    font-size:15px;
}

/* BODY */

.form-body{
    padding:40px;
}

.section-title{
    color:#111827;
    font-size:20px;
    font-weight:700;
    margin-bottom:25px;
    padding-bottom:10px;
    border-bottom:3px solid #f59e0b;
}

.form-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:35px;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.full{
    grid-column:span 2;
}

label{
    margin-bottom:8px;
    color:#374151;
    font-size:14px;
    font-weight:600;
}

input,
select,
textarea{
    width:100%;
    padding:16px;
    border:none;
    border-radius:15px;
    background:#f3f4f6;
    font-size:15px;
    transition:.3s;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    background:#ffffff;
    box-shadow:0 0 0 3px rgba(245,158,11,.3);
}

textarea{
    min-height:120px;
    resize:vertical;
}

.submit-btn{
    width:100%;
    padding:18px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#f59e0b,#d97706);
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.submit-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 30px rgba(245,158,11,.4);
}

.footer{
    text-align:center;
    color:#6b7280;
    margin-top:20px;
    font-size:13px;
}

/* TABLET */

@media(max-width:900px){

    .form-body{
        padding:25px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }
}

/* MOBILE */

@media(max-width:600px){

    body{
        padding:8px;
    }

    .form-card{
        border-radius:18px;
    }

    .header{
        padding:25px 15px;
    }

    .header h1{
        font-size:24px;
        line-height:1.4;
    }

    .header p{
        font-size:13px;
    }

    .form-body{
        padding:18px;
    }

    .section-title{
        font-size:16px;
    }

    label{
        font-size:13px;
    }

    input,
    select,
    textarea{
        padding:18px;
        font-size:16px;
        border-radius:12px;
    }

    .submit-btn{
        font-size:16px;
        padding:18px;
    }

    .footer{
        font-size:11px;
    }
}
</style>
</head>

<body>

<div class="container">

<div class="form-card">

<div class="header">
<h1>AL-FATTAH CAR GARAGE</h1>
<p>Professional Vehicle Service & Maintenance Registration</p>
</div>

<div class="form-body">

<form action="https://webto.salesforce.com/servlet/servlet.WebToLead?encoding=UTF-8&orgId=00DdL00000wSdoD" method="POST">

<input type="hidden" name="oid" value="00DdL00000wSdoD">

<!-- CUSTOMER -->

<div class="section-title">
Customer Information
</div>

<div class="form-grid">

<div class="form-group">
<label>First Name</label>
<input type="text" name="first_name" required>
</div>

<div class="form-group">
<label>Last Name</label>
<input type="text" name="last_name" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" name="email" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="tel" name="phone">
</div>

<div class="form-group">
<label>Business / Organization</label>
<input type="text" name="company">
</div>

<div class="form-group">
<label>City</label>
<input type="text" name="city">
</div>

<div class="form-group">
<label>Country</label>
<select name="country_code">
<option value="">Select Country</option>
<option value="IN">India</option>
<option value="AE">United Arab Emirates</option>
<option value="SA">Saudi Arabia</option>
<option value="KW">Kuwait</option>
</select>
</div>

<div class="form-group">
<label>State</label>
<select name="state_code">
<option value="">Select State</option>
<option value="AP">Andhra Pradesh</option>
<option value="TG">Telangana</option>
<option value="KA">Karnataka</option>
<option value="TN">Tamil Nadu</option>
</select>
</div>

</div>

<!-- VEHICLE -->

<div class="section-title">
Vehicle Information
</div>

<div class="form-grid">

<div class="form-group full">
<label>Vehicle Name</label>
<input
type="text"
id="00NdL00002TNNjn"
name="00NdL00002TNNjn">
</div>

<div class="form-group">
<label>Vehicle Brand</label>
<input type="text" placeholder="Toyota, BMW, Honda">
</div>

<div class="form-group">
<label>Vehicle Model</label>
<input type="text" placeholder="2024 Model">
</div>

<div class="form-group">
<label>Service Required</label>
<select>
<option>General Service</option>
<option>Oil Change</option>
<option>Engine Repair</option>
<option>Brake Service</option>
<option>AC Repair</option>
<option>Electrical Service</option>
<option>Wheel Alignment</option>
</select>
</div>

<div class="form-group full">
<label>Additional Notes</label>
<textarea placeholder="Describe the vehicle problem or service requirement"></textarea>
</div>

</div>

<button class="submit-btn" type="submit">
REGISTER SERVICE REQUEST
</button>

</form>

<div class="footer">
© 2026 Al-Fattah Car Garage | Premium Vehicle Care Services
</div>

</div>

</div>

</div>

</body>
</html>
